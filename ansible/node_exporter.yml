---

- name: Install Node exporter
  hosts: all
  become: yes

  vars: 
    ne_version: "1.11.1"

  tasks:
    - name: Download Node exporter tarball
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ ne_version }}/node_exporter-{{ ne_version }}.linux-amd64.tar.gz"
        dest: /tmp/node_exporter-{{ ne_version }}.linux-amd64.tar.gz

    - name: extract the tarball
      unarchive: 
        src: /tmp/node_exporter-{{ ne_version }}.linux-amd64.tar.gz
        dest: /tmp/
        remote_src: yes

    - name: Copy the binary 
      copy:
        src: /tmp/node_exporter-{{ ne_version }}.linux-amd64/node_exporter
        dest: /usr/local/bin/node_exporter
        mode: '0755'
        remote_src: yes


    - name: Create the service file for node exporter
      copy: 
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target
          #Managed by ansible
          [Service]
          User=root
          ExecStart=/usr/local/bin/node_exporter

          [Install]
          WantedBy=multi-user.target
  
        dest: /etc/systemd/system/node_exporter.service
        mode: '0644'
      notify: restart node exporter


    - name: Enable node exporter
      systemd:
        name: node_exporter
        enabled: yes
 
    - name: Open firewall
      firewalld:
        port: 9100/tcp
        permanent: yes
        state: enabled
        immediate: yes


  handlers:
    - name: restart node exporter
      systemd:
        name: node_exporter
        state: restarted 
        daemon_reload: yes
