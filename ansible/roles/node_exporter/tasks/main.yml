---
- name: Download Node Exporter tarball
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ ne_version }}/node_exporter-{{ ne_version }}.linux-amd64.tar.gz"
    dest: /tmp/node_exporter-{{ ne_version }}.linux-amd64.tar.gz

- name: Extract the tarball
  unarchive:
    src: /tmp/node_exporter-{{ ne_version }}.linux-amd64.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Copy the binary
  copy:
    src: /tmp/node_exporter-{{ ne_version }}.linux-amd64/node_exporter
    dest: /usr/local/bin/node_exporter
    mode: '0755'
    remote_src: yes
  notify: Restart Node Exporter 


- name: Create the service file
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: '0644'  
  notify: Restart Node Exporter 


- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Enable Node Exporter service
  systemd:
    name: node_exporter
    enabled: yes

- name: Start Node Exporter service
  systemd:
    name: node_exporter
    state: started

- name: Open firewall port 9100
  firewalld:
    port: 9100/tcp
    permanent: yes
    state: enabled
    immediate: yes
