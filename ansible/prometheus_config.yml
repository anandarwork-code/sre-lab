---
- name: Deploy prometheus configuration
  hosts: monitoring
  become: yes

  tasks:
    - name: Deploy prometheus.yml from template
      template:
        src: templates/prometheus.yml.j2
        dest: /etc/prometheus/prometheus.yml
        owner: prometheus
        group: prometheus
        mode: '0644'
      notify: restart prometheus

  handlers: 
    - name: restart prometheus
      systemd:
        name: prometheus
        state: restarted
